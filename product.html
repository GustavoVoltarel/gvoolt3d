<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produto | GVolt 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="site-glow"></div>

    <header class="topbar">
      <a class="brand" href="index.html" aria-label="GVolt 3D">
        <img src="assets/gvolt-logo.jpeg" alt="Logo GVolt 3D" />
        <span>GVolt <strong>3D</strong></span>
      </a>

      <nav class="nav-links" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="index.html#produtos">Produtos</a>
        <a href="index.html#contato">Contato</a>
      </nav>
    </header>

    <main class="detail-page">
      <a href="index.html#produtos" class="back-link"
        ><i class="fa-solid fa-arrow-left"></i> Voltar para todos os produtos</a
      >

      <section id="product-detail-container" class="product-detail-container">
        <div class="detail-gallery">
          <!-- Main image with arrows -->
          <div class="main-image-wrapper">
            <button class="nav-arrow prev" aria-label="Foto anterior">&#10094;</button>
            <img id="main-image" src="" alt="Produto" />
            <button class="nav-arrow next" aria-label="Próxima foto">&#10095;</button>
          </div>
          <!-- Thumbnails -->
          <div class="thumbnail-container" id="thumbnail-container"></div>
        </div>

        <div class="product-info">
          <p class="eyebrow">
            <i class="fa-solid fa-bolt"></i> Produto GVolt 3D
          </p>
          <h1 id="product-name"></h1>
          <div class="rating" id="availability-info"></div>
          <p id="product-price" class="price"></p>
          <p id="product-description" class="description"></p>
          <!-- Specs list -->
          <ul id="product-specs" class="product-specs"></ul>
          <!-- Technical specs table -->
          <table id="technical-specs-table" class="technical-specs"></table>

          <a id="buy-button" class="buy-button" href="#" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
            Comprar via WhatsApp
          </a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-brand">
        <img src="assets/gvolt-logo.jpeg" alt="Logo GVolt 3D" />
        <strong>GVolt <span>3D</span></strong>
      </div>
      <p>Soluções criativas em impressão 3D.</p>
    </footer>

    <script>
      function getParameterByName(name, url = window.location.href) {
        name = name.replace(/[\[\]]/g, "\\$&");
        const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
        const results = regex.exec(url);
        if (!results) return null;
        if (!results[2]) return "";
        return decodeURIComponent(results[2].replace(/\+/g, " "));
      }

      function formatPrice(value) {
        return value.toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL",
        });
      }

      const productId = getParameterByName("id");

      // Render gallery
      function getProductImages(product) {
        if (product.images && product.images.length) {
          return product.images;
        }
        return product.image ? [product.image] : [];
      }

      function renderProductGallery(images) {
        const mainImageEl = document.getElementById("main-image");
        const thumbnailContainer = document.getElementById("thumbnail-container");
        let currentIndex = 0;

        function showImage(index) {
          currentIndex = index;
          mainImageEl.src = images[index];
          const thumbnails = thumbnailContainer.querySelectorAll("img");
          thumbnails.forEach((thumb, idx) => {
            if (idx === index) {
              thumb.classList.add("active-thumb");
            } else {
              thumb.classList.remove("active-thumb");
            }
          });
        }

        // Clear previous thumbnails
        thumbnailContainer.innerHTML = "";
        images.forEach((imgSrc, idx) => {
          const thumb = document.createElement("img");
          thumb.src = imgSrc;
          thumb.alt = "Miniatura " + (idx + 1);
          thumb.addEventListener("click", () => showImage(idx));
          thumbnailContainer.appendChild(thumb);
        });
        // Show first image
        if (images.length) showImage(0);

        // Arrows navigation
        document.querySelector(".nav-arrow.prev").onclick = () => {
          const newIndex = (currentIndex - 1 + images.length) % images.length;
          showImage(newIndex);
        };
        document.querySelector(".nav-arrow.next").onclick = () => {
          const newIndex = (currentIndex + 1) % images.length;
          showImage(newIndex);
        };
      }

      fetch("products.json")
        .then((response) => response.json())
        .then((products) => {
          const product = products.find((item) => item.id === productId);
          const container = document.getElementById("product-detail-container");
          if (!product) {
            container.innerHTML = '<p class="empty-message">Produto não encontrado.</p>';
            return;
          }
          document.title = product.name + " | GVolt 3D";
          document.getElementById("product-name").textContent = product.name;
          document.getElementById("product-description").textContent = product.description;
          document.getElementById("product-price").textContent = formatPrice(product.price);

          // Availability info with lead time
          const availabilityInfo = document.getElementById("availability-info");
          let availabilityText = "";
          if (product.availability) {
            availabilityText = product.availability;
          }
          if (product.leadTimeDays) {
            availabilityText += availabilityText ? " • " : "";
            availabilityText += `Prazo: ${product.leadTimeDays} dias`;
          }
          availabilityInfo.textContent = availabilityText;

          // Specs list
          const specsContainer = document.getElementById("product-specs");
          specsContainer.innerHTML = "";
          if (product.specs && product.specs.length) {
            product.specs.forEach((spec) => {
              const li = document.createElement("li");
              li.innerHTML = `<i class="fa-solid fa-check"></i> ${spec}`;
              specsContainer.appendChild(li);
            });
          }

          // Technical specs table
          const techTable = document.getElementById("technical-specs-table");
          techTable.innerHTML = "";
          if (product.technicalSpecs) {
            const tbody = document.createElement("tbody");
            for (const [key, value] of Object.entries(product.technicalSpecs)) {
              const row = document.createElement("tr");
              const th = document.createElement("th");
              th.textContent = key;
              const td = document.createElement("td");
              td.textContent = value;
              row.appendChild(th);
              row.appendChild(td);
              tbody.appendChild(row);
            }
            techTable.appendChild(tbody);
          }

          // Gallery images
          const images = getProductImages(product);
          renderProductGallery(images);

          // WhatsApp button
          const whatsappNumber = "5519995325891";
          const message = encodeURIComponent(
            "Olá! Tenho interesse no produto: " +
              product.name +
              " - " +
              formatPrice(product.price),
          );
          document.getElementById("buy-button").href =
            "https://wa.me/" + whatsappNumber + "?text=" + message;
        })
        .catch((error) => {
          console.error("Erro ao carregar produto:", error);
        });
    </script>
  </body>
</html>
