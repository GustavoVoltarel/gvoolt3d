    />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 24px;
      }

      thead {
        background: var(--card-solid);
      }

      th,
      td {
        text-align: left;
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }

      tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.03);
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .actions a,
      .actions button {
        color: var(--purple);
        cursor: pointer;
        text-decoration: none;
        background: transparent;
        border: none;
        padding: 0;
        font: inherit;
      }

      .actions a:hover,
      .actions button:hover {
        text-decoration: underline;
      }

      .actions .danger {
        color: #ff6b6b;
      }

      #new-product-button {
        margin-bottom: 16px;
      }

      @media (max-width: 700px) {
        #products-table thead,
        #calculations-table thead {
          display: none;
        }

        #products-table,
        #products-table tbody,
        #products-table tr,
        #products-table td,
        #calculations-table,
        #calculations-table tbody,
        #calculations-table tr,
        #calculations-table td {
          display: block;
          width: 100%;
        }

        #products-table tr,
        #calculations-table tr {
          margin-bottom: 16px;
          border-bottom: 1px solid var(--border);
        }

        #products-table td,
        #calculations-table td {
          text-align: right;
          position: relative;
          padding-left: 50%;
        }

        #products-table td::before,
        #calculations-table td::before {
          content: attr(data-label);
          position: absolute;
          left: 0;
          width: 50%;
          padding-left: 16px;
          font-weight: 500;
          color: var(--muted);
          text-align: left;
        }

        #products-table td.actions,
        #calculations-table td.actions {
          display: flex;
          justify-content: flex-end;
          gap: 12px;
        }
      }
    </style>
  </head>

  <body>
    <div class="site-glow"></div>

    <header class="topbar">
      <a class="brand" href="index.html" aria-label="GVolt 3D">
        <img
          src="https://ztrzwaosybnmzwjufqld.supabase.co/storage/v1/object/sign/Logo/gvolt-logo(2).jpeg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV85MGZhMzNjNC01ZjczLTQyYjAtYmE0NC0zYWQ0YTI4ZTllNTQiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb2dvL2d2b2x0LWxvZ28oMikuanBlZyIsImlhdCI6MTc3ODE3MTUwMywiZXhwIjo0OTMxNzcxNTAzfQ.9eLch91nOTMxbWJrWqDTJldzdqiuiAJr6Z5tpAWeT2E"
          alt="Logo GVolt 3D"
        />
        <span>GVolt <strong>3D</strong></span>
      </a>

      <nav class="nav-links" aria-label="Navegação principal">
        <a href="admin.html" class="active">Produtos</a>
        <a href="admin-filaments.html">Filamentos</a>
        <a href="admin-printers.html">Impressoras</a>
        <a href="admin-packaging.html">Embalagens</a>
        <a href="admin-extras.html">Extras</a>
        <a href="admin-settings.html">Configurações</a>
        <a href="admin-calculator.html">Calculadora</a>
      </nav>

      <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>

    <main class="admin-page">
      <h2>Gerenciar Produtos</h2>

      <div id="login-container">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="Senha" />
        </div>

        <button class="btn btn-primary" id="login-button">Entrar</button>
        <p id="login-message" class="message error" hidden></p>
      </div>

      <div id="list-container" hidden>
        <p>Lista de produtos cadastrados:</p>

        <button id="new-product-button" class="btn btn-primary">
          Novo Produto
        </button>

        <table id="products-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Preço</th>
              <th>Disponibilidade</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="products-body">
            <!-- Preenchido dinamicamente -->
          </tbody>
        </table>

        <p id="list-message" class="message" hidden></p>

        <h3>Histórico de Cálculos</h3>

        <table id="calculations-table">
          <thead>
            <tr>
              <th>Projeto</th>
              <th>Preço Final</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="calculations-body">
            <!-- Preenchido dinamicamente -->
          </tbody>
        </table>

        <button class="btn btn-secondary" id="logout-button">Sair</button>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-brand">
        <img
          src="https://ztrzwaosybnmzwjufqld.supabase.co/storage/v1/object/sign/Logo/gvolt-logo(2).jpeg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV85MGZhMzNjNC01ZjczLTQyYjAtYmE0NC0zYWQ0YTI4ZTllNTQiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb2dvL2d2b2x0LWxvZ28oMikuanBlZyIsImlhdCI6MTc3ODE3MTUwMywiZXhwIjo0OTMxNzcxNTAzfQ.9eLch91nOTMxbWJrWqDTJldzdqiuiAJr6Z5tpAWeT2E"
          alt="Logo GVolt 3D"
        />
        <strong>GVolt <span>3D</span></strong>
      </div>

      <p>Soluções criativas em impressão 3D.</p>

      <a href="https://wa.me/5519995325891" target="_blank">
        <i class="fa-brands fa-whatsapp"></i> Fale conosco
      </a>
    </footer>

    <script>
      const supabaseClient = window.supabase.createClient(
        window.SUPABASE_URL,
        window.SUPABASE_KEY
      );

      const ADMIN_EMAILS = window.ADMIN_EMAILS || [];

      const loginContainer = document.getElementById("login-container");
      const listContainer = document.getElementById("list-container");
      const loginMessage = document.getElementById("login-message");
      const listMessage = document.getElementById("list-message");
      const productsBody = document.getElementById("products-body");
      const newProductButton = document.getElementById("new-product-button");

      newProductButton.addEventListener("click", () => {
        window.location.href = "admin-create.html";
      });

      function formatMoney(value) {
        if (value === null || value === undefined || value === "") {
          return "";
        }

        return Number(value).toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL",
        });
      }

      function formatDate(value) {
        if (!value) return "";

        return new Date(value).toLocaleDateString("pt-BR");
      }

      function showMessage(text, type = "message") {
        listMessage.textContent = text;
        listMessage.className = type;
        listMessage.hidden = false;
      }

      function clearMessage() {
        listMessage.textContent = "";
        listMessage.hidden = true;
      }

      function addCell(row, label, value) {
        const td = document.createElement("td");
        td.setAttribute("data-label", label);
        td.textContent = value ?? "";
        row.appendChild(td);
        return td;
      }

      async function checkSession() {
        const {
          data: { session },
        } = await supabaseClient.auth.getSession();

        if (session && session.user) {
          if (ADMIN_EMAILS.includes(session.user.email)) {
            showList();
            await loadProducts();
            await loadCalculations();
          } else {
            loginContainer.hidden = false;
            listContainer.hidden = true;
            loginMessage.hidden = false;
            loginMessage.textContent =
              "Este usuário não tem permissão para acessar a área administrativa.";
          }
        } else {
          showLogin();
        }
      }

      function showLogin() {
        loginContainer.hidden = false;
        listContainer.hidden = true;
        loginMessage.hidden = true;
      }

      function showList() {
        loginContainer.hidden = true;
        listContainer.hidden = false;
        loginMessage.hidden = true;
      }

      document
        .getElementById("login-button")
        .addEventListener("click", async () => {
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;

          loginMessage.hidden = true;

          if (!email || !password) {
            loginMessage.textContent = "Preencha e-mail e senha.";
            loginMessage.hidden = false;
            return;
          }

          const { error } = await supabaseClient.auth.signInWithPassword({
            email,
            password,
          });

          if (error) {
            loginMessage.textContent = error.message || "Erro ao fazer login.";
            loginMessage.hidden = false;
          } else {
            await checkSession();
          }
        });

      document
        .getElementById("logout-button")
        .addEventListener("click", async () => {
          await supabaseClient.auth.signOut();
          showLogin();
        });

      async function loadProducts() {
        clearMessage();
        productsBody.innerHTML = "";

        const { data, error } = await supabaseClient
          .from("products")
          .select("id, name, price, availability")
          .order("name", { ascending: true });

        if (error) {
          showMessage(error.message || "Erro ao carregar produtos.", "message error");
          return;
        }

        if (!data || data.length === 0) {
          showMessage("Nenhum produto cadastrado.", "message");
          return;
        }

        data.forEach((prod) => {
          const tr = document.createElement("tr");

          addCell(tr, "Nome", prod.name || "");
          addCell(tr, "Preço", formatMoney(prod.price));
          addCell(tr, "Disponibilidade", prod.availability || "");

          const actions = addCell(tr, "Ações", "");
          actions.className = "actions";

          const editLink = document.createElement("a");
          editLink.href = `admin-edit.html?id=${encodeURIComponent(prod.id)}`;
          editLink.textContent = "Editar";

          const deleteLink = document.createElement("a");
          deleteLink.href = `admin-delete.html?id=${encodeURIComponent(prod.id)}`;
          deleteLink.textContent = "Apagar";

          actions.appendChild(editLink);
          actions.appendChild(deleteLink);

          productsBody.appendChild(tr);
        });
      }

      async function loadCalculations() {
        const calcBody = document.getElementById("calculations-body");

        if (!calcBody) return;

        calcBody.innerHTML = "";

        try {
          const { data, error } = await supabaseClient
            .from("calculations")
            .select("id, project_name, final_price, created_at")
            .order("created_at", { ascending: false });

          if (error) {
            showMessage(error.message || "Erro ao carregar cálculos.", "message error");
            return;
          }

          if (!data || data.length === 0) {
            const row = document.createElement("tr");
            const cell = document.createElement("td");

            cell.colSpan = 4;
            cell.textContent = "Nenhum cálculo salvo.";

            row.appendChild(cell);
            calcBody.appendChild(row);
            return;
          }

          data.forEach((calc) => {
            const tr = document.createElement("tr");

            addCell(tr, "Projeto", calc.project_name || "");
            addCell(tr, "Preço Final", formatMoney(calc.final_price));
            addCell(tr, "Data", formatDate(calc.created_at));

            const actions = addCell(tr, "Ações", "");
            actions.className = "actions";

            const detailsLink = document.createElement("a");
            detailsLink.href = `admin-calculation-details.html?id=${encodeURIComponent(calc.id)}`;
            detailsLink.textContent = "Detalhes";

            const deleteButton = document.createElement("button");
            deleteButton.type = "button";
            deleteButton.className = "danger";
            deleteButton.textContent = "Excluir";
            deleteButton.addEventListener("click", async () => {
              await deleteCalculation(calc.id);
            });

            actions.appendChild(detailsLink);
            actions.appendChild(deleteButton);

            calcBody.appendChild(tr);
          });
        } catch (err) {
          showMessage(err.message || "Erro ao carregar cálculos.", "message error");
        }
      }

      async function deleteCalculation(calculationId) {
        if (!calculationId) return;

        const confirmed = confirm(
          "Tem certeza que deseja excluir este cálculo? Essa ação não poderá ser desfeita."
        );

        if (!confirmed) return;

        try {
          const { error } = await supabaseClient
            .from("calculations")
            .delete()
            .eq("id", calculationId);

          if (error) throw error;

          showMessage("Cálculo excluído com sucesso.", "message success");
          await loadCalculations();
        } catch (err) {
          showMessage(err.message || "Erro ao excluir cálculo.", "message error");
        }
      }

      checkSession();

      const menuToggle = document.getElementById("menu-toggle");
      const navLinks = document.querySelector(".nav-links");

      if (menuToggle && navLinks) {
        menuToggle.addEventListener("click", () => {
          navLinks.classList.toggle("show");
        });
      }
    </script>
  </body>
</html>
